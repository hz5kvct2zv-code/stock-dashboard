<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Institutional Market Research Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f2f0ea;
      --surface: #fffdf8;
      --ink: #101010;
      --muted: #66645f;
      --soft: #85827b;
      --line: #d9d4c8;
      --line-strong: #1d1b18;
      --accent: #f2b705;
      --accent-2: #aa2634;
      --teal: #0b756f;
      --green: #1d7a4d;
      --red: #a72a25;
      --amber: #9b6a00;
      --blue: #235d9f;
      --shadow: 0 18px 48px rgba(18, 18, 18, 0.10);
      --serif: Georgia, "Times New Roman", ui-serif, serif;
      --sans: Aptos, "Helvetica Neue", Arial, ui-sans-serif, system-ui, sans-serif;
      --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(16, 16, 16, 0.055), transparent 220px),
        var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.48;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }

    .site-top {
      background: #0f0f0f;
      color: #fff;
      border-bottom: 4px solid var(--accent);
    }

    .top-inner {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, auto);
      gap: 20px;
      align-items: center;
      min-height: 78px;
    }

    .brand-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand {
      font-family: var(--serif);
      font-size: clamp(30px, 3vw, 44px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .edition {
      border-left: 1px solid rgba(255,255,255,0.22);
      padding-left: 12px;
      color: #e8e1cf;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .timestamp {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 620px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .timestamp span {
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 7px 9px;
      color: #f8f4e8;
    }

    .access-strip {
      border-top: 1px solid rgba(255,255,255,0.16);
      background: #191816;
      color: #fff8df;
    }

    .access-inner {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      padding: 9px 0;
      font-size: 12px;
      font-weight: 800;
    }

    .access-label {
      color: var(--accent);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .dashboard-link {
      max-width: 100%;
      overflow-wrap: anywhere;
      font-family: var(--mono);
      font-size: 11px;
      color: #fff;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .shell {
      width: min(1480px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 18px 0 46px;
    }

    .market-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--line-strong);
      background: var(--surface);
    }

    .quote-tile {
      min-height: 82px;
      padding: 13px 14px 12px;
      border-right: 1px solid var(--line);
    }

    .quote-tile:last-child { border-right: 0; }

    .eyebrow {
      color: var(--soft);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .quote-value {
      margin-top: 6px;
      font-family: var(--serif);
      font-size: clamp(21px, 2.1vw, 31px);
      font-weight: 900;
      line-height: 1;
    }

    .quote-note {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin: 14px 0 18px;
      padding: 10px;
      border: 1px solid var(--line);
      background: rgba(242, 240, 234, 0.92);
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 28px rgba(17, 17, 17, 0.08);
    }

    .search {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      background: #fff;
      color: var(--ink);
      padding: 0 13px;
      font: 650 14px var(--sans);
      outline: none;
    }

    .search:focus { border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(170, 38, 52, 0.12); }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 5px;
    }

    .tab {
      height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      font: 850 12px var(--sans);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .tab.active {
      background: var(--ink);
      color: #fff;
      box-shadow: inset 0 -3px 0 var(--accent);
    }

    .front-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.42fr) minmax(330px, 0.58fr);
      gap: 18px;
      align-items: start;
    }

    .lead-story {
      min-height: 430px;
      background:
        linear-gradient(135deg, rgba(242, 183, 5, 0.22), transparent 45%),
        linear-gradient(180deg, #fffdf8, #f9f6ee);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow);
      padding: clamp(22px, 3vw, 34px);
    }

    .lead-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .lead-kicker::before {
      content: "";
      width: 34px;
      height: 5px;
      background: var(--accent);
      display: inline-block;
    }

    .lead-title {
      margin: 16px 0 12px;
      max-width: 950px;
      font-family: var(--serif);
      font-size: clamp(38px, 6vw, 78px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0;
    }

    .lead-summary {
      max-width: 850px;
      color: #2a2926;
      font-size: clamp(17px, 1.5vw, 22px);
      line-height: 1.42;
    }

    .lead-points {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .lead-point {
      position: relative;
      padding-left: 18px;
      color: #33312d;
      font-size: 14px;
      font-weight: 650;
    }

    .lead-point::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 7px;
      height: 7px;
      background: var(--accent-2);
      border-radius: 50%;
    }

    .right-rail {
      display: grid;
      gap: 12px;
    }

    .rail-card, .panel, .story-card, .table-wrap {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(17, 17, 17, 0.055);
    }

    .rail-card, .panel { padding: 16px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 12px;
      padding-bottom: 9px;
      border-bottom: 2px solid var(--line-strong);
      font-family: var(--serif);
      font-size: 24px;
      line-height: 1.05;
    }

    .mini-count {
      font-family: var(--sans);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .news-list {
      display: grid;
      gap: 0;
    }

    .list-item {
      display: grid;
      gap: 6px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .list-item:last-child { border-bottom: 0; padding-bottom: 0; }
    .list-item:hover .item-title { color: var(--accent-2); }

    .item-title {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.25;
    }

    .item-desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .meta-row, .tag-row, .source-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .pill, .tag, .source {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .pill {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
    }

    .pill.positive { color: var(--green); border-color: rgba(29, 122, 77, 0.28); background: #eef8f2; }
    .pill.negative { color: var(--red); border-color: rgba(167, 42, 37, 0.28); background: #fff0ee; }
    .pill.watch { color: var(--amber); border-color: rgba(155, 106, 0, 0.32); background: #fff7db; }
    .pill.neutral { color: var(--blue); border-color: rgba(35, 93, 159, 0.28); background: #edf4ff; }

    .tag {
      border: 1px solid var(--line);
      background: #f5f2e9;
      color: #5c5750;
    }

    .source {
      border: 1px solid rgba(11, 117, 111, 0.22);
      background: #ebf8f6;
      color: var(--teal);
      text-transform: none;
      letter-spacing: 0;
    }

    .content-stack {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .story-card {
      position: relative;
      min-height: 210px;
      padding: 16px;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .story-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .story-card:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
    }

    .story-card:hover::before { opacity: 1; }

    .story-card h3 {
      margin: 10px 0 8px;
      font-family: var(--serif);
      font-size: 24px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .story-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .story-footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .memo-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.55fr);
      gap: 18px;
      align-items: start;
    }

    .memo-article {
      background: var(--surface);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow);
      padding: clamp(20px, 3vw, 34px);
    }

    .memo-title {
      margin: 8px 0 10px;
      font-family: var(--serif);
      font-size: clamp(34px, 5vw, 64px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .memo-summary {
      margin: 0 0 18px;
      color: #2a2926;
      font-size: clamp(17px, 1.5vw, 21px);
      line-height: 1.45;
    }

    .memo-section {
      border-top: 1px solid var(--line);
      padding-top: 16px;
      margin-top: 16px;
    }

    .memo-section h3 {
      margin: 0 0 8px;
      font-family: var(--serif);
      font-size: 25px;
      line-height: 1.05;
    }

    .memo-section p {
      margin: 0;
      color: var(--muted);
    }

    .memo-link {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin-top: 14px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      padding: 0 12px;
      background: #111;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .two-column {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(320px, 0.55fr);
      gap: 18px;
    }

    .freshness-row, .timeline-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .freshness-row:last-child, .timeline-row:last-child { border-bottom: 0; padding-bottom: 0; }

    .timeline-date {
      color: var(--accent-2);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 900;
    }

    .table-wrap {
      overflow: auto;
      border-color: var(--line-strong);
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
      background: var(--surface);
    }

    th, td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #111;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
    }

    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #fff7df; }
    tr:last-child td { border-bottom: 0; }

    .ticker {
      font-family: var(--mono);
      font-weight: 950;
      letter-spacing: 0.02em;
    }

    .move {
      font-family: var(--serif);
      font-size: 23px;
      font-weight: 900;
      white-space: nowrap;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .mini {
      background: #f8f5ec;
      border: 1px solid var(--line);
      padding: 12px;
    }

    .mini strong {
      display: block;
      margin-bottom: 7px;
      color: var(--ink);
    }

    ul.clean {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .empty {
      padding: 28px;
      border: 1px dashed var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .reader-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      background: rgba(13, 13, 13, 0.56);
      padding: 24px;
      overflow: auto;
    }

    .reader-overlay.open {
      display: block;
    }

    .reader-panel {
      width: min(980px, 100%);
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--line-strong);
      box-shadow: 0 30px 100px rgba(0,0,0,0.34);
    }

    .reader-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 22px;
      border-bottom: 4px solid var(--accent);
      background: #111;
      color: #fff;
    }

    .reader-header h2 {
      margin: 8px 0 0;
      font-family: var(--serif);
      font-size: clamp(30px, 5vw, 56px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .close-reader {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255,255,255,0.35);
      background: transparent;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }

    .reader-body {
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .reader-lede {
      color: #292824;
      font-size: 18px;
      line-height: 1.55;
    }

    .reader-section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .reader-section h3 {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    body.modal-open { overflow: hidden; }

    @media (max-width: 1100px) {
      .front-grid, .memo-shell, .two-column { grid-template-columns: 1fr; }
      .news-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .market-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .quote-tile:nth-child(2) { border-right: 0; }
      .quote-tile:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
    }

    @media (max-width: 760px) {
      .top-inner, .controls { grid-template-columns: 1fr; }
      .timestamp, .tabs { justify-content: flex-start; }
      .brand { white-space: normal; }
      .edition { display: none; }
      .lead-points, .news-grid, .market-strip, .split { grid-template-columns: 1fr; }
      .quote-tile { border-right: 0; border-bottom: 1px solid var(--line); }
      .quote-tile:last-child { border-bottom: 0; }
      .shell, .top-inner, .access-inner { width: min(100vw - 20px, 720px); }
      .reader-overlay { padding: 10px; }
      .reader-header, .reader-body { padding: 16px; }
    }
  </style>
</head>

  <script>
    const data = JSON.parse(document.getElementById("dashboard-data").textContent);
    const tabs = [
      ["latest", "Overview"],
      ["brief", "Daily Brief"],
      ["movers", "Movers"],
      ["opportunities", "Opportunities"],
      ["watchlist", "Watchlist"],
      ["calendar", "Calendar"],
      ["themes", "Themes"],
      ["sources", "Sources"]
    ];
    const state = { tab: "latest", query: "" };

    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[char]));
    const arr = (value) => Array.isArray(value) ? value : [];
    const text = (value, fallback = "") => value === undefined || value === null || value === "" ? fallback : String(value);
    const objText = (value) => JSON.stringify(value ?? {}).toLowerCase();
    const matches = (value) => !state.query || objText(value).includes(state.query);
    const entries = (kind) => arr(data[kind]).map((item, index) => ({ kind, item, index })).filter((entry) => matches(entry.item));
    const market = data.market_read || {};
    const memo = data.daily_memo || data.daily_research || data.memo || {};

    function toneFor(value) {
      const raw = String(value || "").toLowerCase();
      if (raw.includes("risk-off") || raw.includes("negative") || raw.includes("down") || raw.includes("-")) return "negative";
      if (raw.includes("risk-on") || raw.includes("positive") || raw.includes("current") || raw.includes("+")) return "positive";
      if (raw.includes("watch") || raw.includes("partial") || raw.includes("event")) return "watch";
      return "neutral";
    }

    function pill(label, tone = "neutral") {
      return `<span class="pill ${esc(toneFor(tone))}">${esc(label)}</span>`;
    }

    function tagList(items) {
      return arr(items).filter(Boolean).map((item) => `<span class="tag">${esc(item)}</span>`).join("");
    }

    function bulletList(items) {
      const list = arr(items).filter(Boolean);
      return list.length ? `<ul class="clean">${list.map((item) => `<li>${esc(item)}</li>`).join("")}</ul>` : "";
    }

    function titleFor(kind, item) {
      if (kind === "movers") return `${item.ticker || ""} ${item.name || "Mover"}`.trim();
      if (kind === "calendar") return item.event || "Market Event";
      if (kind === "watchlist") return `${item.ticker ? item.ticker + " " : ""}${item.name || "Watchlist"}`;
      return `${item.ticker ? item.ticker + " " : ""}${item.name || item.title || "Research Brief"}`.trim();
    }

    function leadHeadline() {
      if (market.headline) return market.headline;
      if (market.title) return market.title;
      const firstSentence = String(market.summary || "").split(". ")[0];
      return firstSentence || data.title || "Latest Investment Research";
    }

    function summaryFor(kind, item) {
      if (kind === "opportunities") return item.setup || item.mispricing || "";
      if (kind === "movers") return item.catalyst || item.interpretation || "";
      if (kind === "watchlist") return item.why || item.next_event || "";
      if (kind === "calendar") return item.market_relevance || "";
      if (kind === "themes") return item.summary || "";
      return item.summary || "";
    }

    function sourceLinks(sources) {
      const list = arr(sources).filter(Boolean);
      if (!list.length) return "";
      return `<div class="source-row">${list.map((source) => {
        const label = source.title || source.publisher || source.url || "Source";
        const meta = [source.publisher, source.date].filter(Boolean).join(" · ");
        const full = meta ? `${label} (${meta})` : label;
        if (source.url) return `<a class="source" href="${esc(source.url)}" target="_blank" rel="noreferrer">${esc(full)}</a>`;
        return `<span class="source">${esc(full)}</span>`;
      }).join("")}</div>`;
    }

    function empty(label) {
      return `<div class="empty">${esc(label)}</div>`;
    }

    function renderMarketStrip() {
      const tiles = arr(data.indices).slice(0, 4);
      document.getElementById("market-strip").innerHTML = (tiles.length ? tiles : [
        { label: "Market", value: market.stance || "Research", change: data.as_of || data.generated_at }
      ]).map((item) => `<article class="quote-tile">
        <div class="eyebrow">${esc(item.label || "Signal")}</div>
        <div class="quote-value">${esc(item.value || "-")}</div>
        <div class="quote-note">${esc([item.change, item.detail].filter(Boolean).join(" · "))}</div>
      </article>`).join("");
    }

    function renderList(kind, limit = 5) {
      const rows = entries(kind).slice(0, limit);
      if (!rows.length) return empty("No matching research.");
      return `<div class="news-list">${rows.map(({ item, index }) => `<article class="list-item" data-open-kind="${kind}" data-open-index="${index}">
        <div class="meta-row">${item.ticker ? pill(item.ticker, "neutral") : ""}${pill(item.change || item.confidence || item.status || item.severity || item.date || "Brief", item.severity || item.status || item.change)}</div>
        <h3 class="item-title">${esc(titleFor(kind, item))}</h3>
        <p class="item-desc">${esc(summaryFor(kind, item))}</p>
      </article>`).join("")}</div>`;
    }

    function renderStoryCard(entry, label) {
      const { kind, item, index } = entry;
      return `<article class="story-card" data-open-kind="${kind}" data-open-index="${index}">
        <div class="meta-row">${pill(label || kind, item.severity || item.status || item.change)}${item.ticker ? pill(item.ticker, "neutral") : ""}</div>
        <h3>${esc(titleFor(kind, item))}</h3>
        <p>${esc(summaryFor(kind, item))}</p>
        <div class="story-footer">${sourceLinks(item.sources) || tagList(item.tickers || item.exposure || [item.date].filter(Boolean))}</div>
      </article>`;
    }

    function memoTone(tone) {
      const raw = String(tone || "").toLowerCase();
      if (raw.includes("risk") || raw.includes("negative") || raw.includes("bear")) return "negative";
      if (raw.includes("watch") || raw.includes("uncertain") || raw.includes("pending")) return "watch";
      if (raw.includes("opportunity") || raw.includes("positive") || raw.includes("bull")) return "positive";
      return "neutral";
    }

    function renderDailyBrief() {
      if (!memo || !Object.keys(memo).length) {
        return empty("No daily brief has been published to this dashboard yet.");
      }
      const sections = arr(memo.sections).filter((section) => matches(section));
      const recs = arr(memo.recommendations).filter((item) => matches(item));
      const sectionHtml = sections.map((section) => `<section class="memo-section">
        <div class="meta-row">${pill(section.tone || "Brief", memoTone(section.tone))}</div>
        <h3>${esc(section.heading || section.title || "Research note")}</h3>
        ${section.body ? `<p>${esc(section.body)}</p>` : ""}
        ${bulletList(section.bullets)}
        ${sourceLinks(section.sources)}
      </section>`).join("");
      const recHtml = recs.map((item) => `<article class="list-item">
        <div class="meta-row">${pill(item.tone || item.status || "Recommendation", memoTone(item.tone || item.status))}${tagList(item.tickers)}</div>
        <h3 class="item-title">${esc(item.label || item.name || "Recommendation")}</h3>
        <p class="item-desc">${esc(item.summary || item.why || "")}</p>
        ${sourceLinks(item.sources)}
      </article>`).join("");
      return `<section class="memo-shell">
        <article class="memo-article">
          <div class="lead-kicker">${esc(memo.as_of || data.as_of || "Daily research")}</div>
          <h1 class="memo-title">${esc(memo.title || "Daily Research Brief")}</h1>
          <p class="memo-summary">${esc(memo.summary || market.summary || "")}</p>
          ${memo.doc_url ? `<a class="memo-link" href="${esc(memo.doc_url)}" target="_blank" rel="noreferrer">Open Google Doc</a>` : ""}
          ${sectionHtml || empty("No matching brief sections.")}
        </article>
        <aside class="right-rail">
          <section class="rail-card">
            <h2 class="section-title">Recommendations <span class="mini-count">${recs.length}</span></h2>
            <div class="news-list">${recHtml || empty("No matching recommendations.")}</div>
          </section>
          <section class="rail-card">
            <h2 class="section-title">Brief Sources <span class="mini-count">${arr(memo.sources).length}</span></h2>
            ${sourceLinks(memo.sources) || empty("No brief-level sources.")}
          </section>
        </aside>
      </section>`;
    }

    function renderFreshness() {
      const items = Object.entries(data.freshness || {});
      if (!items.length) return empty("No freshness metadata.");
      return items.map(([key, value]) => {
        const status = typeof value === "object" ? value.status : value;
        const asOf = typeof value === "object" ? value.as_of : "";
        return `<div class="freshness-row">
          <div>
            <div class="item-title">${esc(key.replaceAll("_", " "))}</div>
            <p class="item-desc">${esc(asOf)}</p>
          </div>
          ${pill(status || "current", status)}
        </div>`;
      }).join("");
    }

    function renderLatest() {
      const leadPoints = arr(market.key_points).slice(0, 6).map((point) => `<div class="lead-point">${esc(point)}</div>`).join("");
      const opportunityCards = entries("opportunities").slice(0, 3).map((entry) => renderStoryCard(entry, "Opportunity")).join("");
      const signalCards = entries("signals").slice(0, 3).map((entry) => renderStoryCard(entry, "Signal")).join("");
      const memoCard = memo && Object.keys(memo).length ? `<section class="panel">
        <h2 class="section-title">Daily Brief <span class="mini-count">${esc(memo.as_of || data.as_of || "")}</span></h2>
        <p class="item-desc">${esc(memo.summary || "The daily research memo is available in the Daily Brief tab.")}</p>
        ${memo.doc_url ? `<a class="memo-link" href="${esc(memo.doc_url)}" target="_blank" rel="noreferrer">Open Google Doc</a>` : ""}
      </section>` : "";
      return `
        <section class="front-grid">
          <article class="lead-story" data-open-kind="market" data-open-index="0">
            <div class="lead-kicker">${esc(market.stance || "Latest read")}</div>
            <h1 class="lead-title">${esc(leadHeadline())}</h1>
            <p class="lead-summary">${esc(market.summary || "No lead research summary is available.")}</p>
            <div class="lead-points">${leadPoints}</div>
          </article>
          <aside class="right-rail">
            <section class="rail-card">
              <h2 class="section-title">Top Opportunities <span class="mini-count">${entries("opportunities").length}</span></h2>
              ${renderList("opportunities", 4)}
            </section>
            <section class="rail-card">
              <h2 class="section-title">Freshness <span class="mini-count">${Object.keys(data.freshness || {}).length}</span></h2>
              ${renderFreshness()}
            </section>
            ${memoCard}
          </aside>
        </section>

        <section class="content-stack">
          <section>
            <h2 class="section-title">Research Front Page <span class="mini-count">Signals</span></h2>
            <div class="news-grid">${signalCards || empty("No matching signals.")}</div>
          </section>
          <section class="two-column">
            <article class="panel">
              <h2 class="section-title">Mover Radar <span class="mini-count">${entries("movers").length}</span></h2>
              ${renderList("movers", 6)}
            </article>
            <article class="panel">
              <h2 class="section-title">Next Catalysts <span class="mini-count">${entries("calendar").length}</span></h2>
              ${renderTimeline(5)}
            </article>
          </section>
          <section>
            <h2 class="section-title">Opportunity Desk <span class="mini-count">Priority briefs</span></h2>
            <div class="news-grid">${opportunityCards || empty("No matching opportunities.")}</div>
          </section>
        </section>`;
    }

    function renderMovers() {
      const rows = entries("movers");
      if (!rows.length) return empty("No matching movers.");
      return `<div class="table-wrap"><table>
        <thead><tr><th>Ticker</th><th>Move</th><th>Company</th><th>Catalyst</th><th>Interpretation</th><th>Sources</th></tr></thead>
        <tbody>${rows.map(({ item, index }) => `<tr data-open-kind="movers" data-open-index="${index}">
          <td class="ticker">${esc(item.ticker || "")}</td>
          <td class="move">${esc(item.change || "")}</td>
          <td><strong>${esc(item.name || "")}</strong><br><span class="item-desc">${esc([item.price, item.volume].filter(Boolean).join(" · "))}</span></td>
          <td>${esc(item.catalyst || "")}</td>
          <td>${esc(item.interpretation || "")}</td>
          <td>${sourceLinks(item.sources)}</td>
        </tr>`).join("")}</tbody>
      </table></div>`;
    }

    function renderOpportunities() {
      const cards = entries("opportunities").map((entry) => renderStoryCard(entry, "Opportunity")).join("");
      return `<section class="news-grid">${cards || empty("No matching opportunities.")}</section>`;
    }

    function renderWatchlist() {
      const cards = entries("watchlist").map((entry) => renderStoryCard(entry, "Watchlist")).join("");
      return `<section class="news-grid">${cards || empty("No matching watchlist items.")}</section>`;
    }

    function renderThemes() {
      const cards = entries("themes").map((entry) => renderStoryCard(entry, "Theme")).join("");
      return `<section class="news-grid">${cards || empty("No matching themes.")}</section>`;
    }

    function renderTimeline(limit = Infinity) {
      const items = entries("calendar").slice(0, limit);
      if (!items.length) return empty("No matching calendar items.");
      return items.map(({ item, index }) => `<article class="timeline-row" data-open-kind="calendar" data-open-index="${index}">
        <div>
          <div class="timeline-date">${esc([item.date, item.time].filter(Boolean).join(" · "))}</div>
          <h3 class="item-title">${esc(item.event || "Market event")}</h3>
          <p class="item-desc">${esc(item.market_relevance || "")}</p>
        </div>
        ${pill("Catalyst", "watch")}
      </article>`).join("");
    }

    function renderCalendar() {
      return `<section class="panel"><h2 class="section-title">Catalyst Calendar <span class="mini-count">${entries("calendar").length}</span></h2>${renderTimeline()}</section>`;
    }

    function collectSources() {
      const seen = new Set();
      const sources = [];
      const add = (source, context) => {
        if (!source) return;
        const src = typeof source === "string" ? { title: source } : source;
        const key = [src.url, src.title, src.date].join("|");
        if (seen.has(key)) return;
        seen.add(key);
        sources.push({ ...src, context });
      };
      const walk = (value, context = "Dashboard") => {
        if (Array.isArray(value)) return value.forEach((item) => walk(item, context));
        if (!value || typeof value !== "object") return;
        if (Array.isArray(value.sources)) value.sources.forEach((source) => add(source, value.title || value.name || value.ticker || context));
        if (value.source) add(value.source, value.title || value.name || context);
        Object.entries(value).forEach(([key, child]) => {
          if (key !== "sources" && key !== "source") walk(child, value.title || value.name || context);
        });
      };
      arr(data.citations).forEach((source) => add(source, "Global"));
      walk(data);
      return sources;
    }

    function renderSources() {
      const sources = collectSources().filter(matches);
      if (!sources.length) return empty("No matching sources.");
      return `<section class="news-grid">${sources.map((source) => `<article class="story-card">
        <div class="meta-row">${pill(source.publisher || source.context || "Source", "neutral")}${source.date ? pill(source.date, "watch") : ""}</div>
        <h3>${source.url ? `<a href="${esc(source.url)}" target="_blank" rel="noreferrer">${esc(source.title || source.url)}</a>` : esc(source.title || "Source")}</h3>
        <p>${esc(source.note || source.context || "")}</p>
      </article>`).join("")}</section>`;
    }

    function detailSection(title, body) {
      if (!body) return "";
      return `<section class="reader-section"><h3>${esc(title)}</h3>${body}</section>`;
    }

    function renderDetail(kind, item) {
      if (kind === "market") {
        return `
          <p class="reader-lede">${esc(market.summary || "")}</p>
          ${detailSection("Key points", bulletList(market.key_points))}
          ${detailSection("Freshness", renderFreshness())}`;
      }
      const lede = summaryFor(kind, item);
      const sections = [];
      if (kind === "opportunities") {
        sections.push(detailSection("Mispricing hypothesis", `<p>${esc(item.mispricing || "")}</p>`));
        sections.push(detailSection("Catalysts", bulletList(item.catalysts)));
        sections.push(`<div class="split"><div class="mini"><strong>Bull case</strong>${bulletList(item.bull_case)}</div><div class="mini"><strong>Bear case</strong>${bulletList(item.bear_case)}</div></div>`);
        sections.push(detailSection("Disconfirming evidence", bulletList(item.disconfirming_evidence)));
      }
      if (kind === "movers") {
        sections.push(detailSection("Catalyst", `<p>${esc(item.catalyst || "")}</p>`));
        sections.push(detailSection("Interpretation", `<p>${esc(item.interpretation || "")}</p>`));
        sections.push(detailSection("Market action", `<p>${esc([item.price, item.change, item.volume].filter(Boolean).join(" · "))}</p>`));
      }
      if (kind === "watchlist") {
        sections.push(detailSection("Why it matters", `<p>${esc(item.why || "")}</p>`));
        sections.push(detailSection("Next event", `<p>${esc([item.next_event, item.date].filter(Boolean).join(" · "))}</p>`));
      }
      if (kind === "calendar") {
        sections.push(detailSection("Market relevance", `<p>${esc(item.market_relevance || "")}</p>`));
        sections.push(detailSection("Timing", `<p>${esc([item.date, item.time].filter(Boolean).join(" · "))}</p>`));
      }
      if (kind === "signals" || kind === "themes") {
        sections.push(detailSection("Exposure", tagList(item.tickers || item.exposure)));
      }
      sections.push(detailSection("Sources", sourceLinks(item.sources)));
      return `<p class="reader-lede">${esc(lede)}</p>${sections.join("")}`;
    }

    function openReader(kind, index) {
      const item = kind === "market" ? market : arr(data[kind])[Number(index)];
      if (!item) return;
      document.getElementById("reader-kicker").textContent = kind === "market" ? "Lead Read" : kind.replaceAll("_", " ");
      document.getElementById("reader-title").textContent = kind === "market" ? (market.stance || "Market Read") : titleFor(kind, item);
      document.getElementById("reader-body").innerHTML = renderDetail(kind, item);
      document.getElementById("reader").classList.add("open");
      document.getElementById("reader").setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
    }

    function closeReader() {
      document.getElementById("reader").classList.remove("open");
      document.getElementById("reader").setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open");
    }

    function render() {
      document.getElementById("page-title").textContent = "Opportunity Wire";
      const dashboardLink = document.getElementById("dashboard-link");
      if (dashboardLink) {
        dashboardLink.href = window.location.href;
        dashboardLink.textContent = window.location.href;
      }
      document.getElementById("meta").innerHTML = [
        `<span>${esc(text(data.as_of, data.generated_at))}</span>`,
        `<span>${esc(arr(data.citations).length)} sources</span>`
      ].join("");
      renderMarketStrip();
      document.getElementById("tabs").innerHTML = tabs.map(([id, label]) => `<button class="tab ${state.tab === id ? "active" : ""}" data-tab="${id}" type="button">${label}</button>`).join("");
      document.querySelectorAll("[data-tab]").forEach((button) => button.addEventListener("click", () => {
        state.tab = button.dataset.tab;
        render();
      }));

      const views = {
        latest: renderLatest,
        brief: renderDailyBrief,
        movers: renderMovers,
        opportunities: renderOpportunities,
        watchlist: renderWatchlist,
        calendar: renderCalendar,
        themes: renderThemes,
        sources: renderSources
      };
      document.getElementById("content").innerHTML = (views[state.tab] || renderLatest)();
    }

    document.getElementById("search").addEventListener("input", (event) => {
      state.query = event.target.value.trim().toLowerCase();
      render();
      document.getElementById("search").value = event.target.value;
      document.getElementById("search").focus();
    });

    document.addEventListener("click", (event) => {
      if (event.target.closest("a")) return;
      const trigger = event.target.closest("[data-open-kind]");
      if (trigger) openReader(trigger.dataset.openKind, trigger.dataset.openIndex);
      if (event.target.id === "reader" || event.target.id === "reader-close") closeReader();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeReader();
    });

    render();
  </script>
</body>
</html>
